<style>
/* ===== GENEL ===== */
body{
 margin:0;
 font-family:'Segoe UI',system-ui;
 background:radial-gradient(circle at top,#111a3a,#050914);
 color:#fff;
}

section{
 padding:24px 20px;
 max-width:420px;
 margin:auto;
 animation:fade .3s ease;
}

@keyframes fade{
 from{opacity:0;transform:translateY(10px)}
 to{opacity:1;transform:none}
}

/* ===== FORM ===== */
input,select{
 width:100%;
 padding:14px 16px;
 margin-top:12px;
 border-radius:14px;
 background:#0f1735;
 border:1px solid #ffffff22;
 color:#fff;
 font-size:14px;
 outline:none;
}

input:focus,select:focus{
 border-color:#00e5ff;
 box-shadow:0 0 0 2px #00e5ff22;
}

/* ===== BUTON ===== */
button{
 width:100%;
 padding:14px;
 margin-top:14px;
 border-radius:16px;
 border:none;
 font-size:15px;
 font-weight:700;
 cursor:pointer;
 transition:.2s;
 background:linear-gradient(135deg,#00e5ff,#6a5cff);
 color:#000;
 box-shadow:0 10px 30px #00e5ff33;
}

button:hover{
 transform:translateY(-1px);
 box-shadow:0 14px 40px #00e5ff55;
}

button:active{
 transform:scale(.98);
}

/* ===== LİSTE ===== */
.list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #1b2445;
  padding: 16px 24px;
  margin: 12px 0;
  border-radius: 20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
  width: 100%;
  max-width: 520px;
  gap: 16px;
  position: relative;
}

/* İkon ve isim için grup */
.guard-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1; /* isim grubunu genişletip ortaya hizalamak için */
}

/* İsim */
.guard-name {
  font-size: 16px;
  font-weight: 500;
  color: #eaf1f7;
  margin-left: 8px; /* ikon ile isim arası boşluk */
}

/* DENETLENDİ etiketi */
.checked-label {
  background: linear-gradient(90deg, #00f0ff, #00d4ff);
  color: #000;
  padding: 6px 14px;
  border-radius: 12px;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 13px;
  margin-left: 12px;
}

/* Ara butonu */
.right-actions {
  margin-left: 8px; /* biraz sola kaydır */
}

.right-actions button {
  padding: 8px 14px;
  font-size: 14px;
  border: 1px solid #00d4ff;
  border-radius: 12px;
  background: transparent;
  color: #00f0ff;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}

.right-actions button:hover {
  background: #00d4ff;
  color: #000;
}


/* ===== BADGE ===== */
.badge{
 background:linear-gradient(135deg,#00e5ff,#6a5cff);
 color:#000;
 padding:4px 10px;
 border-radius:20px;
 font-size:11px;
 font-weight:800;
 box-shadow:0 0 10px #00e5ff88;
}

/* ===== BAŞLIKLAR ===== */
h2,h3{
 margin:0 0 10px;
 letter-spacing:.3px;
}

h2{
 font-size:20px;
 color:#00e5ff;
}

h3{
 font-size:15px;
 color:#8fdfff;
}

/* ===== KART ===== */
.card{
 background:linear-gradient(135deg,#1b2445,#202c5a);
 padding:22px;
 border-radius:22px;
 box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.row{
 display:flex;
 justify-content:space-between;
 margin:8px 0;
 font-size:14px;
}

/* ===== ALERT ===== */
.alert-box{
 background:linear-gradient(135deg,#1b2445,#202c5a);
 padding:26px;
 border-radius:22px;
 box-shadow:0 30px 80px rgba(0,0,0,.6);
}
#qr-reader{
 border-radius:20px;
 overflow:hidden;
 box-shadow:0 20px 50px rgba(0,0,0,.5);
}
/* ===== KIMLIK SÜRESİ UYARI ===== */
.expiry-warning{
 background:linear-gradient(135deg,#ff3b3b,#b30000);
 padding:12px 16px;
 border-radius:14px;
 font-size:14px;
 font-weight:800;
 margin-top:14px;
 color:#fff;
 text-align:center;
 box-shadow:
  0 0 15px rgba(255,0,0,.8),
  inset 0 0 10px rgba(0,0,0,.4);
 animation:pulseRed 1.2s infinite;
 transform:translateZ(0);
}

/* 3D kırmızı yanıp sönme */
@keyframes pulseRed{
 0%{
  box-shadow:0 0 8px rgba(255,0,0,.4);
  transform:scale(1);
 }
 50%{
  box-shadow:0 0 30px rgba(255,0,0,1);
  transform:scale(1.03);
 }
 100%{
  box-shadow:0 0 8px rgba(255,0,0,.4);
  transform:scale(1);
 }
}
.hidden{display:none !important}
#appAlert{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.65);
 display:flex;
 align-items:center;
 justify-content:center;
 z-index:9999;
}
.danger-text{
 color:#ff4d4d;
 font-weight:800;
 text-shadow:0 0 10px rgba(255,0,0,.6);
}
html, body {
  overscroll-behavior-y: contain;
  touch-action: pan-x pan-y;
}
.offline-card {
  border: 2px solid #ff3b3b;
  box-shadow:
    0 0 0 2px rgba(255,0,0,.4),
    0 0 18px rgba(255,0,0,.6);
  animation: offlinePulse 1.4s infinite;
}

@keyframes offlinePulse {
  0%   { box-shadow: 0 0 6px rgba(255,0,0,.4); }
  50%  { box-shadow: 0 0 22px rgba(255,0,0,.9); }
  100% { box-shadow: 0 0 6px rgba(255,0,0,.4); }
}

</style>
</head>

<script>

// 🔐 SADECE MENÜDEN GELEN GİREBİLİR
if (sessionStorage.getItem("menuAllowed") !== "ok") {
  window.location.replace("index.html");
} else {
  // sadece ilk girişte izin ver
  sessionStorage.removeItem("menuAllowed");
}


firebase.initializeApp({
 apiKey:"AIzaSyCye0QlekBFonTxfeBIlhLc9ia-mleyfUM",
 authDomain:"denetleme-4d3d9.firebaseapp.com",
 databaseURL:"https://denetleme-4d3d9-default-rtdb.firebaseio.com",
 projectId:"denetleme-4d3d9"
});
const db=firebase.database();
/* 🔥 MERKEZ PERSONEL SENKRON FONKSİYONU */
function syncPersonnel({ tc, adSoyad, data = {} }) {

 const updates = {};

 updates[`personnel/${tc}/tc`] = tc;
 updates[`personnel/${tc}/adSoyad`] = adSoyad;

 Object.keys(data).forEach(k => {
  updates[`personnel/${tc}/${k}`] = data[k];
 });

 return firebase.database().ref().update(updates);
}


let proje="", aktifDevriyeId=null, tcNo="", guard={}, mevcutDenetimId=null, mode="new";

/* 🔥 OFFLINE İÇİN: PERSONEL BU PROJEDE Mİ? */
function isPersonnelInThisProject(tc){
  const map = JSON.parse(
    localStorage.getItem("projectPersonnel_" + proje) || "{}"
  );
  return !!map[tc];
}

let qrInstance = null;
let flashOn = false;

const auth = firebase.auth();

let currentUser = null;
let currentProfileName = "";


/* 🔐 GİRİŞ KONTROL */
/* 🔐 GİRİŞ KONTROL VE STATUS GÜNCELLEME */
/* 🔐 GİRİŞ KONTROL VE STATUS GÜNCELLEME */
auth.onAuthStateChanged(user => {
  if (!user) {
    // Giriş yoksa login sayfasına at
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  // Kullanıcı profilini yükle
  loadProfile();

  // Kullanıcı adı / maili
  const displayName = currentUser.displayName || currentUser.email || "İsimsiz Kullanıcı";

  // Status referansı
  const userStatusDatabaseRef = db.ref("/status/" + user.uid);

  // Offline ve online objeleri
  const isOfflineForDB = {
    state: "offline",
    name: displayName,
    last_changed: firebase.database.ServerValue.TIMESTAMP
  };

  const isOnlineForDB = {
    state: "online",
    name: displayName,
    last_changed: firebase.database.ServerValue.TIMESTAMP
  };

  // Bağlantı kontrolü
  db.ref(".info/connected").on("value", snapshot => {
    if (snapshot.val() === false) {
      // Bağlantı yoksa offline yaz
      userStatusDatabaseRef.set(isOfflineForDB);
      return;
    }

    // Disconnect durumunda offline yaz
    userStatusDatabaseRef.onDisconnect().set(isOfflineForDB).then(() => {
      // Bağlantı varsa online yaz
      userStatusDatabaseRef.set(isOnlineForDB);
    });
  });
});

/* 🔓 Profil Yükleme */
function loadProfile() {
  const uid = currentUser.uid;

  db.ref("users/" + uid).once("value", snap => {
    if (!snap.exists()) return;

    const d = snap.val();
    currentProfileName = d.fullName || currentUser.displayName || currentUser.email || "İsimsiz Kullanıcı";
    profileName.innerText = currentProfileName;

    // 🔓 BUTONLARI AKTİF ET
    btnGorev.disabled = false;
    btnUygunsuz.disabled = false;
  });
}

function openProfile(){
 profileEmailInput.value = currentUser.email;
 profileModal.classList.remove("hidden");
}

function closeProfile(){
 profileModal.classList.add("hidden");
 newPassword.value = "";
}

function updatePassword(){

 const pass = newPassword.value;

 if(pass.length < 6){
  showAlert({
   title:"Zayıf Şifre",
   message:"Şifre en az 6 karakter olmalı",
   buttons:[{text:"Tamam"}]
  });
  return;
 }

 currentUser.updatePassword(pass)
  .then(()=>{
   showAlert({
    title:"Başarılı",
    message:"Şifre güncellendi",
    buttons:[{text:"Tamam"}]
   });
   closeProfile();
  })
  .catch(err=>{
   showAlert({
    title:"Hata",
    message:"Güvenlik nedeniyle tekrar giriş yapmanız gerekebilir",
    buttons:[{text:"Tamam"}]
   });
  });
}

/* PROJELER */
db.ref("projects").once("value",s=>{
 projectSelect.innerHTML="<option value=''>Seç</option>";
 s.forEach(p=>{
  projectSelect.innerHTML+=`<option value="${p.key}">${p.val().projectName}</option>`;
 });
});

/* SAYFA YENİLENİRSE DEVAM */
window.onload = () => {
localStorage.removeItem("canEnterApp");

 const p = localStorage.getItem("proje");
 const d = localStorage.getItem("devriye");

 if(!p){
  localStorage.clear();
  return;
 }

 proje = p;
 aktifDevriyeId = d || null;

 // 🔥 BÜYÜK BAŞLIK HER ZAMAN SET EDİLİR
 db.ref(`projects/${p}`).once("value", snap=>{
  if(snap.exists()){
   projectTitle.innerText = snap.val().projectName;
  }
 });

 projectPage.classList.add("hidden");
 listPage.classList.remove("hidden");

 loadList();
 loadLastPatrolInfo();
};

function loadLastPatrolInfo(){

 db.ref(`projects/${proje}`).once("value", pSnap=>{

  if(!pSnap.exists()) return;

  const data = pSnap.val();
  const projeAdi = data.projectName;
  const lastEnd = data.lastPatrolEnd;
  const lastBy  = data.lastPatrolBy;

  let html = `
   <div>
    <b>📍 ${projeAdi}</b><br>
  `;

  if(!lastEnd){
   html += `🚫 Henüz denetlenmedi`;
  }else{
   html += `
    🕒 Son denetim:
    <span class="time">${timeAgo(lastEnd)}</span> önce
   `;

   if(lastBy && lastBy.name){
    html += `
     <br>
     👤 <b>Son Denetleyen:</b> ${lastBy.name}
    `;
   }
  }

  html += `</div>`;

  lastPatrolInfo.innerHTML = html;
 });
}






function showNoPatrol(){
 lastPatrolInfo.innerHTML = `
  <div>
   <b>📍 ${projectTitle.innerText}</b><br>
   🚫 Henüz denetlenmedi
  </div>
 `;
}


function selectProject(){

 if(!projectSelect.value){
  alert("Lütfen proje seç");
  return;
 }

 proje = projectSelect.value;

db.ref(`projects/${proje}/personnel`).once("value", snap => {

  const map = {};

  const promises = [];

  snap.forEach(tcSnap => {
    const tc = tcSnap.key;

    promises.push(
      db.ref(`personnel/${tc}`).once("value").then(perSnap => {
        if(perSnap.exists()){
          map[tc] = true;              // 👈 sadece varlık bilgisi
          cachePersonnel(tc, perSnap.val());
        }
      })
    );
  });

Promise.all(promises).then(()=>{
  localStorage.setItem(
    "projectPersonnel_" + proje,
    JSON.stringify(map)
  );

  // 🔥 ARTIK CACHE DOLU
  loadList();
});


});


 projectPage.classList.add("hidden");
 listPage.classList.remove("hidden");

 db.ref(`projects/${proje}`).once("value",s=>{
  projectTitle.innerText = s.val().projectName;
 });

 loadLastPatrolInfo();
}



 

function loadList() {
  guardList.innerHTML = ""; // Listeyi temizle
  const rendered = new Set();
  const offline = !navigator.onLine;
  const map = JSON.parse(localStorage.getItem("projectPersonnel_" + proje) || "{}");

  // Offline mod
// Offline mod
if (offline) {
  if (Object.keys(map).length === 0) {
    guardList.innerHTML = "<p>Offline modda personel bulunamadı</p>";
    return;
  }

  const offlineInspections = JSON.parse(localStorage.getItem("offlineInspections") || "[]");

  Object.keys(map).forEach(tc => {
    if (rendered.has(tc)) return;
    rendered.add(tc);

    const cached = getCachedPersonnel(tc);
    const adSoyad = cached && cached.adSoyad ? cached.adSoyad : "Yükleniyor...";
    const denetlendi = offlineInspections.some(i => i.proje === proje && i.tcNo === tc);

    // 🔴 Kartın kırmızı çerçeve alması için offline-card sınıfını ekliyoruz
    guardList.innerHTML += `
      <div class="list-item offline-card" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0;">
        <span class="guard-name">👮 ${adSoyad}</span>
        <div class="right-actions" style="display: flex; align-items: center; gap: 8px;">
          ${denetlendi ? `<span class="badge">DENETLENDİ</span>` : ""}
          <button class="call-btn" onclick="callGuard('${tc}')">📞 Ara</button>
        </div>
      </div>
    `;
  });

  return;
}


  // Online mod
  db.ref(`projects/${proje}/personnel`).once("value", snap => {
    if (!snap.exists()) {
      guardList.innerHTML = "<p>Bu projede personel yok</p>";
      return;
    }

    snap.forEach(tcSnap => {
      const tc = tcSnap.key;
      if (rendered.has(tc)) return;
      rendered.add(tc);

      const cached = getCachedPersonnel(tc);
      const adSoyad = cached && cached.adSoyad ? cached.adSoyad : "Yükleniyor...";

      db.ref(`denetimler/${proje}/${tc}`)
        .orderByChild("devriyeId")
        .equalTo(aktifDevriyeId)
        .limitToLast(1)
        .once("value")
        .then(dSnap => {
          const denetlendi = dSnap.exists();

          guardList.innerHTML += `
            <div class="list-item" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0;">
              <span class="guard-name">👮 ${adSoyad}</span>
              <div class="right-actions" style="display: flex; align-items: center; gap: 8px;">
                ${denetlendi ? `<span class="badge">DENETLENDİ</span>` : ""}
                <button class="call-btn" onclick="callGuard('${tc}')">📞 Ara</button>
              </div>
            </div>
          `;
        });
    });
  });
}


function timeAgo(ms){
 const diff = Date.now() - ms;
 const dk = Math.floor(diff / 60000);
 const saat = Math.floor(dk / 60);
 const gun = Math.floor(saat / 24);

 if(gun > 0) return `${gun} gün ${saat % 24} saat ${dk % 60} dakika`;

function checkKimlikExpiry(tarihStr){

 if(!tarihStr){
  return { danger:true, text:"❌ Kimlik bilgisi yok" };
 }


 const today = new Date();
 const expiry = new Date(tarihStr);

 const diffMs = expiry - today;
 const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
 const diffMonths = Math.floor(diffDays / 30);

 if(diffDays <= 0){
  return {
   danger:true,
   text:"❌ Kimlik süresi DOLMUŞ"
  };
 }

 if(diffMonths < 6){
  return {
   danger:true,
   text:`⚠️ Kimlik süresinin bitmesine ${diffMonths} ay ${diffDays % 30} gün kaldı`
  };
 }

 return {
  danger:false,
  text:`✅ Kimlik geçerli (${diffMonths} ay ${diffDays % 30} gün kaldı)`
 };
}

function saveProfilePhoto(canvas, quality){

 const base64 = canvas.toDataURL("image/jpeg", quality);
 const sizeKB = Math.round((base64.length * 3) / 4 / 1024);

 if(sizeKB > 300 && quality > 0.2){
  return saveProfilePhoto(canvas, quality - 0.1);
 }

 }

   facingMode:{ ideal:"environment" } // ✅ ANDROID + IOS
  },
  audio:false
 }).then(stream=>{

function captureProfilePhoto(){

 const vw = camera.videoWidth;
 const vh = camera.videoHeight;
 if(!vw || !vh) return Promise.reject();

 const rect = camera.getBoundingClientRect();
 const guideSize = 220;

 const guideCenterX = rect.width / 2;
 const guideCenterY = rect.height / 2;

 const videoRatio = vw / vh;
 const viewRatio  = rect.width / rect.height;

 let renderedW, renderedH, offsetX = 0, offsetY = 0;

 if(videoRatio > viewRatio){
  renderedH = rect.height;
  renderedW = renderedH * videoRatio;
  offsetX = (renderedW - rect.width) / 2;
 }else{
  renderedW = rect.width;
  renderedH = renderedW / videoRatio;
  offsetY = (renderedH - rect.height) / 2;
 }

 const scaleX = vw / renderedW;
 const scaleY = vh / renderedH;

 const sx = Math.round((guideCenterX - guideSize/2 + offsetX) * scaleX);
 const sy = Math.round((guideCenterY - guideSize/2 + offsetY) * scaleY);
 const sSize = Math.round(guideSize * scaleX);

 const canvas = document.createElement("canvas");
 canvas.width = sSize;
 canvas.height = sSize;

 const ctx = canvas.getContext("2d");
 ctx.drawImage(camera, sx, sy, sSize, sSize, 0, 0, sSize, sSize);

 // 🔥 PROMISE DÖNDÜR
 return saveProfilePhoto(canvas, 0.85);
}

  if(!cached){

      message:"Bu personel offline verilerde bulunamadı",
      buttons:[{text:"Tamam"}]
    });
    return;
  }

  guard = {
    tc: tcNo,
    ...cached
  };

  // zorunlu alan kontrolü
  if(!guard.telefon || !guard.kimlikTuru || !guard.kimlikGecerlilik){
    qrPage.classList.add("hidden");
    requiredPage.classList.remove("hidden");
    return;
  }

  qrPage.classList.add("hidden");
  showCard();

window.addEventListener("online", async ()=>{

  const key = "offlineInspections";

  if(!list.length) return;

  try{
    for(const x of list){
      await db.ref(`denetimler/${x.proje}/${x.tcNo}`).push(x.data);
    }

    localStorage.removeItem(key);

    // 🔥 ÇÖZÜM BURASI
    if(listPage && !listPage.classList.contains("hidden")){
      guardList.innerHTML = "";   // NET SIFIRLAMA
      setTimeout(loadList, 300);  // Firebase yazımı bitsin
    }

    showAlert({
      title:"Senkron Tamam",
      message:"Offline denetimler sisteme yüklendi",
      buttons:[{text:"Tamam"}]
    });

  }catch(e){
    showAlert({
      title:"Senkron Hatası",
      message:"Bazı offline veriler yüklenemedi",
      buttons:[{text:"Tamam"}]
    });
  }
});


function cachePersonnel(tc, data){
 const all = JSON.parse(localStorage.getItem("personnelCache") || "{}");
 all[tc] = data;
 localStorage.setItem("personnelCache", JSON.stringify(all));
}

function getCachedPersonnel(tc){
 const all = JSON.parse(localStorage.getItem("personnelCache") || "{}");
 return all[tc] || null;
}

<script>
/* 📡 OFFLINE / ONLINE DURUM TAKİBİ (ÜST BAR + MODE + SYNC) */
async function updateOfflineStatus(){
  const el = document.getElementById("offlineStatus");

  if(navigator.onLine){

    // 🔓 OFFLINE MODU KAPAT
    disableOfflineMode();

    // 📡 ÜST BAR GİZLE
    if(el) el.style.display = "none";

    // 🔄 OFFLINE'DA GİRİLEN PERSONEL BİLGİLERİNİ YÜKLE
    await syncOfflinePersonnelUpdates();

  }else{

    // 🔒 OFFLINE MODU AÇ
    enableOfflineMode();

    // 📡 ÜST BAR GÖSTER
    if(el) el.style.display = "block";
  }
}

window.addEventListener("online", () => {
  updateOfflineStatus();
});

window.addEventListener("offline", () => {
  updateOfflineStatus();
});

// ilk açılışta durum kontrolü
updateOfflineStatus();


/* 🔄 OFFLINE PERSONEL BİLGİLERİNİ FIREBASE'E GÖNDER */
async function syncOfflinePersonnelUpdates(){
  const key = "offlinePersonnelUpdates";
  const list = JSON.parse(localStorage.getItem(key) || "[]");
  if(!list.length) return;

  console.log("🔄 Offline personel bilgileri Firebase'e gönderiliyor", list);

  let hasError = false;

  for(const p of list){
    try{
      await syncPersonnel({
        tc: p.tc,
        adSoyad: p.adSoyad,
        data: p.data
      });
    }catch(err){
      console.error("❌ Personel sync hatası:", p.tc, err);
      hasError = true;
    }
  }

  // ❗ SADECE TÜMÜ BAŞARILIYSA TEMİZLE
  if(!hasError){
    localStorage.removeItem(key);
    console.log("✅ Offline personel kuyruğu temizlendi");
  }else{
    console.warn("⚠️ Bazı personel kayıtları gönderilemedi, kuyruk korunuyor");
  }
}


/* 🔒 MOBİLDE AŞAĞI ÇEK → YENİLE ENGEL */
let startY = 0;

window.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
}, { passive: false });

window.addEventListener("touchmove", e => {
  const currentY = e.touches[0].clientY;
  if (window.scrollY === 0 && currentY > startY) {
    e.preventDefault();
  }
}, { passive: false });
setInterval(() => {
  if(navigator.onLine){
    syncOfflinePersonnelUpdates();
  }
}, 5000);
</script>
