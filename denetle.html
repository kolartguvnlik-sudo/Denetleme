
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Denetleme Sistemi</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<script src="https://unpkg.com/html5-qrcode"></script>


<style>
/* ===== GENEL ===== */
body{
 margin:0;
 font-family:'Segoe UI',system-ui;
 background:radial-gradient(circle at top,#111a3a,#050914);
 color:#fff;
}

section{
 padding:24px 20px;
 max-width:420px;
 margin:auto;
 animation:fade .3s ease;
}

@keyframes fade{
 from{opacity:0;transform:translateY(10px)}
 to{opacity:1;transform:none}
}

/* ===== FORM ===== */
input,select{
 width:100%;
 padding:14px 16px;
 margin-top:12px;
 border-radius:14px;
 background:#0f1735;
 border:1px solid #ffffff22;
 color:#fff;
 font-size:14px;
 outline:none;
}

input:focus,select:focus{
 border-color:#00e5ff;
 box-shadow:0 0 0 2px #00e5ff22;
}

/* ===== BUTON ===== */
button{
 width:100%;
 padding:14px;
 margin-top:14px;
 border-radius:16px;
 border:none;
 font-size:15px;
 font-weight:700;
 cursor:pointer;
 transition:.2s;
 background:linear-gradient(135deg,#00e5ff,#6a5cff);
 color:#000;
 box-shadow:0 10px 30px #00e5ff33;
}

button:hover{
 transform:translateY(-1px);
 box-shadow:0 14px 40px #00e5ff55;
}

button:active{
 transform:scale(.98);
}

/* ===== LİSTE ===== */
.list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #1b2445;
  padding: 16px 24px;
  margin: 12px 0;
  border-radius: 20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
  width: 100%;
  max-width: 520px;
  gap: 16px;
  position: relative;
}

/* İkon ve isim için grup */
.guard-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1; /* isim grubunu genişletip ortaya hizalamak için */
}

/* İsim */
.guard-name {
  font-size: 16px;
  font-weight: 500;
  color: #eaf1f7;
  margin-left: 8px; /* ikon ile isim arası boşluk */
}

/* DENETLENDİ etiketi */
.checked-label {
  background: linear-gradient(90deg, #00f0ff, #00d4ff);
  color: #000;
  padding: 6px 14px;
  border-radius: 12px;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 13px;
  margin-left: 12px;
}

/* Ara butonu */
.right-actions {
  margin-left: 8px; /* biraz sola kaydır */
}

.right-actions button {
  padding: 8px 14px;
  font-size: 14px;
  border: 1px solid #00d4ff;
  border-radius: 12px;
  background: transparent;
  color: #00f0ff;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}

.right-actions button:hover {
  background: #00d4ff;
  color: #000;
}


/* ===== BADGE ===== */
.badge{
 background:linear-gradient(135deg,#00e5ff,#6a5cff);
 color:#000;
 padding:4px 10px;
 border-radius:20px;
 font-size:11px;
 font-weight:800;
 box-shadow:0 0 10px #00e5ff88;
}

/* ===== BAŞLIKLAR ===== */
h2,h3{
 margin:0 0 10px;
 letter-spacing:.3px;
}

h2{
 font-size:20px;
 color:#00e5ff;
}

h3{
 font-size:15px;
 color:#8fdfff;
}

/* ===== KART ===== */
.card{
 background:linear-gradient(135deg,#1b2445,#202c5a);
 padding:22px;
 border-radius:22px;
 box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.row{
 display:flex;
 justify-content:space-between;
 margin:8px 0;
 font-size:14px;
}

/* ===== ALERT ===== */
.alert-box{
 background:linear-gradient(135deg,#1b2445,#202c5a);
 padding:26px;
 border-radius:22px;
 box-shadow:0 30px 80px rgba(0,0,0,.6);
}
#qr-reader{
 border-radius:20px;
 overflow:hidden;
 box-shadow:0 20px 50px rgba(0,0,0,.5);
}
/* ===== KIMLIK SÜRESİ UYARI ===== */
.expiry-warning{
 background:linear-gradient(135deg,#ff3b3b,#b30000);
 padding:12px 16px;
 border-radius:14px;
 font-size:14px;
 font-weight:800;
 margin-top:14px;
 color:#fff;
 text-align:center;
 box-shadow:
  0 0 15px rgba(255,0,0,.8),
  inset 0 0 10px rgba(0,0,0,.4);
 animation:pulseRed 1.2s infinite;
 transform:translateZ(0);
}

/* 3D kırmızı yanıp sönme */
@keyframes pulseRed{
 0%{
  box-shadow:0 0 8px rgba(255,0,0,.4);
  transform:scale(1);
 }
 50%{
  box-shadow:0 0 30px rgba(255,0,0,1);
  transform:scale(1.03);
 }
 100%{
  box-shadow:0 0 8px rgba(255,0,0,.4);
  transform:scale(1);
 }
}
.hidden{display:none !important}
#appAlert{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.65);
 display:flex;
 align-items:center;
 justify-content:center;
 z-index:9999;
}
.danger-text{
 color:#ff4d4d;
 font-weight:800;
 text-shadow:0 0 10px rgba(255,0,0,.6);
}
html, body {
  overscroll-behavior-y: contain;
  touch-action: pan-x pan-y;
}
.offline-card {
  border: 2px solid #ff3b3b;
  box-shadow:
    0 0 0 2px rgba(255,0,0,.4),
    0 0 18px rgba(255,0,0,.6);
  animation: offlinePulse 1.4s infinite;
}

@keyframes offlinePulse {
  0%   { box-shadow: 0 0 6px rgba(255,0,0,.4); }
  50%  { box-shadow: 0 0 22px rgba(255,0,0,.9); }
  100% { box-shadow: 0 0 6px rgba(255,0,0,.4); }
}

</style>
</head>

<body>
<section id="profileBar" style="
 max-width:420px;
 margin:10px auto 0;
 background:linear-gradient(135deg,#1b2445,#202c5a);
 padding:14px 18px;
 border-radius:18px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 box-shadow:0 10px 30px rgba(0,0,0,.4)
">
<div style="display:flex;flex-direction:column;gap:3px">

 <span style="
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#8fdfff;
  opacity:.9
 ">
  Denetleyen
 </span>

 <span id="profileName" style="
  font-size:16px;
  font-weight:800;
  background:linear-gradient(135deg,#00e5ff,#6a5cff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 12px rgba(0,229,255,.45);
 ">
  Yükleniyor...
 </span>
<span id="offlineStatus" style="
 display:none;
 font-size:11px;
 font-weight:800;
 color:#ff4d4d;
 text-shadow:0 0 10px rgba(255,0,0,.7);
">
 📡 GÜVENLİ OFFLINE MOD AKTİF
</span>

 <div style="
  width:36px;
  height:3px;
  border-radius:10px;
  background:linear-gradient(90deg,#00e5ff,#6a5cff);
  margin-top:4px
 "></div>

</div>


 <div style="display:flex;gap:8px">
  <button onclick="openProfile()" style="
   width:auto;
   padding:8px 12px;
   border-radius:12px;
   font-size:13px
  ">
   ⚙️
  </button>

  <button onclick="logout()" style="
   width:auto;
   padding:8px 12px;
   border-radius:12px;
   font-size:13px;
   background:linear-gradient(135deg,#ff4d4d,#b30000);
   color:#fff;
   box-shadow:0 6px 18px rgba(255,0,0,.5)
  ">
   ⎋
  </button>
 </div>
</section>


<section id="projectPage">
<h2>📁 Proje Seç</h2>
<select id="projectSelect"></select>
<button onclick="selectProject()">Devam</button>
</section>

<section id="listPage" class="hidden">
<h2 id="projectTitle"></h2>

<div id="lastPatrolInfo" class="last-patrol"></div>

<h3 id="guardTitle" style="margin:14px 0 8px;font-size:15px;color:#8fdfff">
 📌 Projedeki Personeller
</h3>

<div id="guardList"></div>
<button onclick="backToProject()">⬅ Proje Seçimine Dön</button>
<button onclick="startPatrol()">🚀 Denetleme Başlat</button>
<button onclick="finishPatrol()">🏁 Denetlemeyi Bitir</button>

</section>

<section id="qrPage" class="hidden">
<h3>QR Okut</h3>
<button
 onclick="openManual()"
 style="
  width:auto;
  float:right;
  padding:8px 14px;
  font-size:12px;
  margin-top:-34px
 "
>
 🧍 Manuel Personel Tara
</button>


<div id="qr-reader" style="width:300px"></div>

<button onclick="toggleFlash()">🔦 Flash Aç / Kapat</button>
<button onclick="refocusCamera()">🎯 Odakla</button>

</section>

<section id="manualPage" class="hidden">
<h3>🧍 Manuel Personel Tara</h3>

<input
 id="manualTc"
 placeholder="TC Kimlik No"
 maxlength="11"
 inputmode="numeric"
/>

<button onclick="manualSearch()">Ara</button>
<button onclick="backToQr()">⬅ QR Okutmaya Dön</button>
</section>

<section id="requiredPage" class="hidden">
<h3>Zorunlu Bilgiler</h3>
<input id="telefon" placeholder="Telefon">
<select id="kimlikTuru">
<option value="">Kimlik Türü</option>
<option>Silahlı</option>
<option>Silahsız</option>
</select>
<input type="date" id="kimlikGecerlilik">
<button onclick="saveRequired()">Kaydet</button>
</section>

<section id="alreadyPage" class="hidden">

<h3>⚠️ BU PERSONEL DENETLENDİ</h3>
<p id="oldInfo"></p>
<button onclick="continueNewInspection()">➕ Yeni Denetim</button>
<button onclick="continueUpdateInspection()">🔄 Mevcut Denetimi Güncelle</button>

</section>

<section id="cardPage" class="hidden">
<div class="card">

<h2 id="ad"></h2>
<!-- PROFİL FOTO ALANI -->
<div id="photoWrapper"
 onclick="openPhotoOptions()"
 style="
  width:120px;
  height:120px;
  border-radius:12px;
  margin:12px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f1735;
  border:2px dashed #00e5ff88;
  cursor:pointer;
  position:relative;
 ">

 <img id="guardPhoto"
  style="
   width:100%;
   height:100%;
   border-radius:12px;
   object-fit:contain;
   display:none;
  ">

 <span id="photoPlus"
  style="font-size:42px;color:#00e5ff">+</span>

</div>





<div class="row"><span>TC</span><span id="tc"></span></div>
<div class="row"><span>Kimlik</span><span id="kimlik"></span></div>
<div class="row"><span>Geçerlilik</span><span id="gecerlilik"></span></div>
<div id="expiryInfo"></div>





<button id="btnGorev" disabled onclick="saveInspection('gorevi_basinda')">
 ✅ Görevi Başında
</button>

<button id="btnUygunsuz" disabled onclick="openUygunsuz()">
 ⚠️ Uygunsuz
</button>

<div id="uygunsuzPanel" class="hidden">

 <select id="uygunsuzSebep">
 <h4 style="margin:0 0 10px;color:#ff5a5a">
 ⚠️ Uygunsuzluk Detayı
</h4>
  <option value="">Uygunsuzluk sebebi seç</option>
  <option>Uyuyor</option>
  <option>Kılık kıyafet</option>
  <option>Tıraş olmamış</option>
  <option>Kimliği yok</option>
  <option>Görev yerinde değildi</option>
  <option value="diger">Diğer</option>
 </select>
 <input
  id="uygunsuzDiger"
  class="hidden"
  placeholder="Diğer sebebi yaz"
 />
 <button onclick="saveUygunsuz()">Kaydet</button>
</div>
</div>
</section>
<script src="app.js"></script>
<div id="appAlert" class="hidden">
  <div class="alert-box">
    <h3 id="alertTitle"></h3>
    <p id="alertMessage"></p>
    <div id="alertActions"></div>
  </div>
</div>
<!-- 📸 PROFİL FOTO KAMERA MODALI -->
<div id="cameraModal" class="hidden"
 style="
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;
  justify-content:center;
  z-index:9999;
 ">

 <div style="position:relative;width:90%;max-width:360px;">

<video id="camera" autoplay playsinline
 style="width:100%;border-radius:16px;object-fit:cover">
</video>
  <!-- 🔲 KARE REHBER -->
  <div style="
   position:absolute;
   top:50%;
   left:50%;
   width:220px;
   height:220px;
   transform:translate(-50%,-50%);
   border:3px solid #00e5ff;
   border-radius:14px;
   box-shadow:0 0 0 2000px rgba(0,0,0,.55);
   pointer-events:none;
  "></div>

 <button onclick="captureAndClose()" style="margin-top:14px;width:100%">
 📸 Profil Fotoğrafı Oluştur
</button>


  <button onclick="closeCameraModal()"
   style="margin-top:8px;width:100%;background:#ff4d4d;color:#fff">
   ❌ İptal
  </button>

 </div>
</div>
<div id="profileModal" class="hidden"
 style="
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999
 ">

 <div class="card" style="width:90%;max-width:360px">

  <h3>👤 Profil</h3>

  <input id="profileEmailInput" disabled>
  <input id="newPassword" type="password" placeholder="Yeni Şifre">

  <button onclick="updatePassword()">🔐 Şifreyi Güncelle</button>
  <button onclick="closeProfile()" style="background:#ff4d4d;color:#fff">
   ❌ Kapat
  </button>

 </div>
</div>
<script src="ap.js"></script>
</body>
</html>
